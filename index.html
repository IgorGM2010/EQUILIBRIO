<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EQUILÍBRIO</title>
  <style>
    :root {
      --bg: #DCF0F2;
      --surface: #FFFFFF;
      --title: #1D9E75;
      --primary: #C9A0D0;
      --text: #333333;
      --text-muted: #666666;

      --pensamento: #534AB7;
      --emocao: #993556;
      --comportamento: #0F6E56;
      --saude: #854F0B;

      --pensamento-bg: #EEEDFE;
      --pensamento-text: #3C3489;
      --emocao-bg: #F7E8EE;
      --emocao-text: #7A2946;
      --comportamento-bg: #E3F3EE;
      --comportamento-text: #0B5C48;
      --saude-bg: #F6EBDD;
      --saude-text: #6D3F08;

      --adapt-bg: #E1F5EE;
      --adapt-border: #1D9E75;
      --adapt-text: #085041;

      --partial-bg: #FAEEDA;
      --partial-border: #BA7517;
      --partial-text: #412402;

      --des-bg: #FCEBEB;
      --des-border: #A32D2D;
      --des-text: #501313;

      --radius-pill: 50px;
      --tr: 300ms ease;
      --shadow-soft: 0 4px 32px rgba(0, 0, 0, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      position: relative;
      min-height: 100vh;
      background: var(--bg);
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity var(--tr), visibility var(--tr), transform var(--tr);
    }

    .screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(8px);
    }

    .screen-start {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .start-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
    }

    .start-title {
      margin: 0 0 1.5rem;
      text-align: center;
      font-size: clamp(2.2rem, 9vw, 42px);
      line-height: 1.05;
      font-weight: 800;
      color: var(--title);
      letter-spacing: 0.01em;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      transition: background-color var(--tr), border-color var(--tr), color var(--tr), opacity var(--tr), transform var(--tr);
      font-family: inherit;
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.2);
    }

    .btn-start {
      width: 100%;
      border-radius: var(--radius-pill);
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
    }

    .btn-start:hover {
      transform: translateY(-1px);
    }

    .btn-about {
      width: 100%;
      margin-top: 12px;
      border-radius: 999px;
      background: #F2CB65;
      border: none;
      color: #0A9EB7;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      line-height: 1;
      transition: transform 200ms ease, filter 200ms ease, box-shadow 200ms ease;
    }

    .btn-about:hover {
      transform: translateY(-1px);
      filter: brightness(0.985);
      box-shadow: 0 6px 14px rgba(201, 158, 56, 0.26);
    }

    .btn-about-icon {
      width: 1.02rem;
      height: 1.02rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.8px solid currentColor;
      border-radius: 50%;
      font-size: 0.62rem;
      font-weight: 700;
      line-height: 1;
      transform: translateY(-0.2px);
    }

    .btn-about-label {
      letter-spacing: 0.005em;
    }

    .about-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      opacity: 0;
      transition: opacity 250ms ease;
    }

    .about-modal-overlay.is-open {
      opacity: 1;
    }

    .about-modal-overlay.is-closing {
      opacity: 0;
      transition: opacity 200ms ease;
    }

    .about-modal-card {
      background: #FFFFFF;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      transform: scale(0.92);
      opacity: 0;
      transition: transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .about-modal-overlay.is-open .about-modal-card {
      transform: scale(1);
      opacity: 1;
    }

    .about-modal-overlay.is-closing .about-modal-card {
      transform: scale(0.92);
      opacity: 0;
      transition: transform 200ms ease, opacity 200ms ease;
    }

    .about-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid #EEEEEE;
      padding-bottom: 12px;
    }

    .about-modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #1D9E75;
    }

    .about-modal-close {
      background: transparent;
      border: none;
      font-size: 18px;
      color: #999999;
      cursor: pointer;
      transition: color 200ms ease;
    }

    .about-modal-close:hover {
      color: #333333;
    }

    .about-tabs {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }

    .about-tab {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      border: none;
      background: #F5F5F5;
      color: #999999;
      transition: all 200ms ease;
    }

    .about-tab.is-active {
      background: #1D9E75;
      color: #FFFFFF;
    }

    .about-content {
      font-size: 14px;
      color: #444444;
      line-height: 1.7;
      margin-top: 16px;
    }

    .about-content p {
      margin: 0 0 10px;
    }

    .about-content p:last-child {
      margin-bottom: 0;
    }

    .about-item {
      padding: 10px 0;
      border-bottom: 0.5px solid #EEEEEE;
    }

    .about-item:last-child {
      border-bottom: none;
    }

    .about-item-title {
      font-weight: 700;
    }

    .screen-game {
      overflow-y: auto;
      padding: 1.5rem 1rem;
    }

    .game-shell {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: opacity var(--tr);
    }

    .game-shell.fade-out {
      opacity: 0;
    }

    .game-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
    }

    .header-spacer {
      justify-self: start;
      width: 18px;
      height: 18px;
    }

    .header-title {
      justify-self: center;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999999;
      font-weight: 600;
    }

    .header-close {
      justify-self: end;
      border: none;
      background: transparent;
      color: #999999;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      width: 18px;
      height: 18px;
      cursor: default;
    }

    .indicator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      justify-items: center;
      gap: 12px;
      width: 100%;
    }

    .indicator-column {
      text-align: center;
      opacity: 0.25;
      transition: opacity var(--tr);
    }

    .indicator-column.is-active {
      opacity: 1;
    }

    .indicator-emoji {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .indicator-name {
      display: block;
      font-size: 11px;
      letter-spacing: 0.4px;
      color: #666666;
      line-height: 1.2;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 2.5px solid var(--pensamento);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      width: 92%;
      margin: 0 auto;
      transition: border-color var(--tr);
    }

    .card-body {
      padding: 0;
    }

    .situation-text {
      margin: 0;
      padding: 1.1rem 1.4rem;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.72;
      text-wrap: pretty;
      color: #222222;
    }

    .card.is-intro-card .situation-text {
      text-align: justify;
      font-size: 15.5px;
      line-height: 1.65;
      padding: 1rem 1.2rem 1.15rem;
    }

    .howto-lead {
      margin: 0 0 10px;
    }

    .howto-response-list {
      margin: 8px 0 12px;
      padding-left: 1.15rem;
      display: grid;
      gap: 8px;
    }

    .howto-response-item {
      line-height: 1.5;
    }

    .howto-type {
      font-weight: 700;
    }

    .howto-type.adaptativo {
      color: #1D9E75;
    }

    .howto-type.parcial {
      color: #BA7517;
    }

    .howto-type.desadaptativo {
      color: #A32D2D;
    }

    .howto-end {
      margin: 0;
    }

    .context-label {
      margin: 16px 0 0;
      text-align: center;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      color: #AAAAAA;
      font-weight: 600;
    }

    .microfeedback {
      margin-top: 0;
      border-top: 0.5px solid #EEEEEE;
      border-left: 3px solid transparent;
      border-radius: 0;
      padding: 0 14px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity var(--tr), max-height var(--tr), padding var(--tr), background-color var(--tr), border-left-color var(--tr);
    }

    .microfeedback.show {
      opacity: 1;
      max-height: 240px;
      padding: 12px 14px;
    }

    .microfeedback-badge {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border-radius: 0;
      padding: 0;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .microfeedback-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .combo-box {
      margin-top: 0;
      border-top: 0.5px solid #EEEEEE;
      border-left: 3px solid transparent;
      border-radius: 0 8px 8px 0;
      padding: 0 14px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 300ms ease, max-height 300ms ease, padding 300ms ease;
    }

    .combo-box.show {
      opacity: 1;
      max-height: 180px;
      padding: 10px 14px;
    }

    .combo-box.combo-active {
      background: #FFFBEA;
      border-left-color: #E8A020;
      color: #854F0B;
      font-size: 13px;
      line-height: 1.5;
    }

    .combo-box.combo-break {
      background: #F7F7F7;
      border-left-color: #AAAAAA;
      color: #666666;
      font-size: 13px;
      line-height: 1.5;
    }

    .combo-text {
      margin: 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      width: 88%;
      margin: 0 auto;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      background: #FFFFFF;
      border: 1px solid #E0E0E0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      cursor: pointer;
      transition: background-color 200ms ease, border-color var(--tr), color var(--tr), opacity var(--tr), transform var(--tr);
    }

    .option-btn:hover {
      background: #F5F5F5;
    }

    .option-btn.is-dimmed {
      opacity: 0.3;
      pointer-events: none;
    }

    .next-btn {
      width: 88%;
      margin: 0 auto;
      background: var(--title);
      color: #FFFFFF;
      font-weight: 700;
      border-radius: var(--radius-pill);
      padding: 14px;
      font-size: 15px;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity var(--tr), transform var(--tr);
    }

    .next-btn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .summary {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #DCF0F2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity var(--tr), transform var(--tr);
    }

    .summary[hidden] {
      display: none !important;
    }

    .summary.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .summary-card {
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
      margin: auto;
      padding: 1.5rem 1rem;
    }

    .result-journey-title {
      margin: 0;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #1D9E75;
      text-transform: none;
    }

    .result-journey-text {
      margin: 0.7rem 0 1.2rem;
      font-size: 15px;
      color: #444444;
      line-height: 1.7;
      text-align: center;
    }

    .combo-summary {
      font-size: 13px;
      color: #999999;
      text-align: center;
      margin: 8px 0 1.1rem;
    }

    .result-section-title {
      margin: 0 0 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999999;
      font-weight: 600;
    }

    .result-section-panorama {
      margin-top: 2rem;
    }

    .result-section-padrao {
      margin-top: 2rem;
    }

    .result-section-refletir {
      margin-top: 2rem;
    }

    .panorama-list {
      display: grid;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .panorama-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panorama-label {
      width: 160px;
      font-size: 14px;
      font-weight: 500;
      color: #333333;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .panorama-track {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: #E8E8E8;
      overflow: hidden;
    }

    .panorama-fill {
      height: 100%;
      width: 0;
      border-radius: 4px;
      transition: width 600ms ease;
    }

    .panorama-status {
      min-width: 130px;
      white-space: nowrap;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
    }

    .padrao-grid {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 1.2rem;
    }

    .pattern-card {
      flex: 1;
      height: 100%;
      border-radius: 14px;
      padding: 16px;
    }

    .pattern-card strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .pattern-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 0.45rem;
    }

    .pattern-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .pattern-strong {
      background: #E1F5EE;
      border-left: 3px solid #1D9E75;
      color: #085041;
    }

    .pattern-strong .pattern-badge {
      color: #1D9E75;
    }

    .pattern-dev {
      background: #FFF8F0;
      border-left: 3px solid #E8A020;
      color: #412402;
    }

    .pattern-dev .pattern-badge {
      color: #BA7517;
    }

    .reflection-list {
      display: grid;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .reflection-item {
      background: #F7F7F7;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #444444;
      line-height: 1.65;
    }

    .reflection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1D9E75;
      display: inline-block;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .reflection-text {
      flex: 1;
    }

    .result-ethics {
      text-align: center;
      font-size: 12px;
      color: #AAAAAA;
      line-height: 1.6;
      padding: 0 1rem;
      margin: 2rem 0 0;
    }

    .summary-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    .btn-restart {
      width: 88%;
      border-radius: var(--radius-pill);
      padding: 14px;
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      font-size: 15px;
    }

    @media (max-width: 430px) {
      .screen-game {
        padding: 1rem;
      }

      .card,
      .options,
      .next-btn {
        width: 96%;
      }

      .situation-text {
        font-size: 15.5px;
        padding: 1rem 1.2rem;
      }

      .option-btn {
        padding: 13px 14px;
      }

      .panorama-row {
        flex-wrap: wrap;
        gap: 6px;
      }

      .panorama-label,
      .panorama-status {
        width: auto;
      }

      .panorama-track {
        width: 100%;
        flex: 0 0 100%;
      }
    }

    @media (max-width: 479px) {
      .padrao-grid {
        flex-direction: column;
      }

      .pattern-card {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="startScreen" class="screen screen-start">
      <div class="start-card">
        <h1 class="start-title">EQUILÍBRIO</h1>
        <button id="startBtn" class="btn btn-start" type="button" aria-label="Iniciar Joranada">
          <span aria-hidden="true">▶</span>
          <span>Iniciar Jornada</span>
        </button>

        <button id="aboutBtn" class="btn btn-about" type="button">
          <span class="btn-about-icon" aria-hidden="true">i</span>
          <span class="btn-about-label">Sobre o Jogo</span>
        </button>
      </div>
    </section>

    <section id="gameScreen" class="screen screen-game is-hidden" aria-live="polite">
      <main class="game-shell">
        <div class="game-header">
          <div class="header-spacer" aria-hidden="true"></div>
          <div id="progressText" class="header-title">CARTA 1 DE 12</div>
          <button id="closeBtn" class="header-close" type="button" aria-label="Fechar">✕</button>
        </div>

        <div id="indicatorGrid" class="indicator-grid">
          <div class="indicator-column" data-indicator="Pensamento">
            <span class="indicator-emoji">💡</span>
            <span class="indicator-name">Pensamento</span>
          </div>
          <div class="indicator-column" data-indicator="Saúde física">
            <span class="indicator-emoji">☀️</span>
            <span class="indicator-name">Saúde física</span>
          </div>
          <div class="indicator-column" data-indicator="Emoção">
            <span class="indicator-emoji">🩷</span>
            <span class="indicator-name">Emoção</span>
          </div>
          <div class="indicator-column" data-indicator="Comportamento">
            <span class="indicator-emoji">🧠</span>
            <span class="indicator-name">Comportamento</span>
          </div>
        </div>

        <article id="card" class="card">
          <div class="card-body">
            <p id="contextText" class="context-label"></p>
            <p id="situationText" class="situation-text"></p>

            <div id="microfeedback" class="microfeedback" role="status" aria-live="polite">
              <div id="feedbackBadge" class="microfeedback-badge">
                <span id="feedbackTypeLabel"></span>
              </div>
              <p id="feedbackText" class="microfeedback-text"></p>
            </div>

            <div id="comboBox" class="combo-box" aria-live="polite">
              <p id="comboText" class="combo-text"></p>
            </div>
          </div>
        </article>

        <div id="options" class="options"></div>

        <button id="nextBtn" class="btn next-btn" type="button">Próxima carta →</button>

        <section id="summary" class="summary" hidden>
          <div class="summary-card">
            <h2 class="result-journey-title">Sua Jornada</h2>
            <p id="journeyText" class="result-journey-text"></p>
            <p id="comboSummaryText" class="combo-summary" hidden></p>

            <h3 class="result-section-title result-section-panorama">Seus padrões</h3>
            <div id="panoramaList" class="panorama-list"></div>

            <h3 class="result-section-title result-section-padrao">Seu padrão predominante</h3>
            <div class="padrao-grid">
              <article class="pattern-card pattern-strong">
                <span class="pattern-badge">✦ Ponto forte</span>
                <strong id="strongIndicatorName"></strong>
                <p id="strongIndicatorText" class="pattern-text"></p>

    function classificarIndicador(percentual) {
      if (percentual >= 75) {
        return { texto: "✦ Adaptativo", cor: "indicador" };
      }
      if (percentual >= 50) {
        return { texto: "◎ Parcialmente desadaptativo", cor: "#BA7517" };
      }
      return { texto: "○ Desadaptativo", cor: "#A32D2D" };
    }

    function classificarGeral(media) {
      if (media >= 75) {
        return "alta";
      }
      if (media >= 50) {
        return "media";
      }
      return "baixa";
    }

    function textoSaudacao(classificacao) {
      if (classificacao === "alta") {
        return "Você fez escolhas muito saudáveis ao longo da jornada. Isso mostra autoconsciência e cuidado com você. Continue nesse caminho.";
      }
      if (classificacao === "media") {
        return "Você tem pontos fortes importantes e também áreas para desenvolver. Isso é normal e faz parte do autoconhecimento.";
      }
      return "Esta jornada mostrou áreas que pedem mais atenção. Reconhecer isso já é um grande passo. Com pequenas mudanças, você pode avançar bastante.";
    }

    function calcularResultados() {
      const maximos = {
        "Pensamento": 0,
        "Saúde física": 0,
        "Emoção": 0,
        "Comportamento": 0
      };

      cartas.forEach((carta) => {
        carta.indicadores.forEach((indicador) => {
          if (Object.prototype.hasOwnProperty.call(maximos, indicador)) {
            maximos[indicador] += 2;
          }
        });
      });

      const percentuais = {};
      RESULT_ORDER.forEach((indicador) => {
        const maximo = maximos[indicador] || 0;
        const obtido = state.pontuacoes[indicador] || 0;
        percentuais[indicador] = maximo > 0 ? Math.round((obtido / maximo) * 100) : 0;
      });

      const media = Math.round(RESULT_ORDER.reduce((acc, indicador) => acc + percentuais[indicador], 0) / RESULT_ORDER.length);
      return { maximos, percentuais, media };
    }

    function embaralhar(lista) {
      const copia = [...lista];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copia[i];
        copia[i] = copia[j];
        copia[j] = temp;
      }
      return copia;
    }

    function fecharModalSobre() {
      if (!aboutModalOverlay || aboutModalOverlay.classList.contains("is-closing")) {
        return;
      }

      const overlayAtual = aboutModalOverlay;
      overlayAtual.classList.add("is-closing");

      window.setTimeout(() => {
        document.removeEventListener("keydown", overlayAtual._onEscape);
        if (overlayAtual.parentNode) {
          overlayAtual.parentNode.removeChild(overlayAtual);
        }
        if (aboutModalOverlay === overlayAtual) {
          aboutModalOverlay = null;
        }
      }, 200);
    }

    function abrirModalSobre() {
      if (aboutModalOverlay) {
        definirAbaSobre(aboutModalOverlay, "sobre");
        return;
      }

      const overlay = criarModalSobre();
      document.body.appendChild(overlay);
      aboutModalOverlay = overlay;

      definirAbaSobre(overlay, "sobre");

      const tabs = overlay.querySelectorAll(".about-tab");
      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          definirAbaSobre(overlay, tab.getAttribute("data-tab"));
        });
      });

      const closeBtn = overlay.querySelector(".about-modal-close");
      closeBtn.addEventListener("click", fecharModalSobre);

      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) {
          fecharModalSobre();
        }
      });

      overlay._onEscape = (event) => {
        if (event.key === "Escape") {
          fecharModalSobre();
        }
      };
      document.addEventListener("keydown", overlay._onEscape);

      window.requestAnimationFrame(() => {
        overlay.classList.add("is-open");
      });
    }

    function obterEstiloIndicador(indicador) {

    function textoSequenciaCombo(valor) {
      if (valor === 3) {
        return "🔥 3 escolhas saudáveis seguidas. Você começou uma boa sequência.";
      }
      if (valor === 4) {
        return "🔥 4 seguidas. Você está ganhando consistência.";
      }
      if (valor === 5) {
        return "🔥 5 seguidas. Seu ritmo está muito bom.";
      }
      if (valor === 6) {
        return "🔥 6 seguidas. Continue nesse caminho.";
      }
      if (valor === 7) {
        return "🔥 7 seguidas. Você está imparável.";
      }
      return "🔥 " + valor + " seguidas. Sequência incrível.";

    function dispararAnimacaoCombo(valorCombo) {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        return;
      }

      const config = {
        3: { emoji: 48, titulo: "Sequência iniciada!", subtitulo: "3 escolhas saudáveis seguidas" },
        5: { emoji: 56, titulo: "Você está em chamas!", subtitulo: "5 escolhas saudáveis seguidas" },
        7: { emoji: 64, titulo: "Imparável!", subtitulo: "7 escolhas saudáveis seguidas" }
      }[valorCombo];

      if (!config) {
        return;
      }

      const flash = document.createElement("div");
      flash.style.position = "fixed";
      flash.style.top = "0";
      flash.style.left = "0";
      flash.style.width = "100%";
      flash.style.height = "100%";
      flash.style.pointerEvents = "none";
      flash.style.zIndex = "9997";
      flash.style.background = "radial-gradient(circle at center, rgba(232, 160, 32, 0.15) 0%, transparent 70%)";
      flash.style.opacity = "0";
      flash.style.transition = "opacity 200ms ease";
      document.body.appendChild(flash);
      requestAnimationFrame(() => {
        flash.style.opacity = "1";
      });
      setTimeout(() => {
        flash.style.opacity = "0";
      }, 200);
      setTimeout(() => {
        flash.remove();
      }, 800);

      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.top = "50%";
      overlay.style.left = "50%";
      overlay.style.transform = "translate(-50%, -50%)";
      overlay.style.display = "flex";
      overlay.style.flexDirection = "column";
      overlay.style.alignItems = "center";
      overlay.style.gap = "8px";
      overlay.style.pointerEvents = "none";
      overlay.style.zIndex = "9999";
      overlay.style.background = "rgba(255, 251, 234, 0.92)";
      overlay.style.borderRadius = "20px";
      overlay.style.padding = "24px 32px";
      overlay.style.border = "1.5px solid rgba(232, 160, 32, 0.4)";
      overlay.style.boxShadow = "0 8px 32px rgba(232, 160, 32, 0.2)";
      overlay.style.opacity = "0";
      overlay.style.transition = "opacity 200ms ease";

      const emoji = document.createElement("div");
      emoji.textContent = "🔥";
      emoji.style.fontSize = config.emoji + "px";
      emoji.style.lineHeight = "1";

      const titulo = document.createElement("div");
      titulo.textContent = config.titulo;
      titulo.style.fontSize = "20px";
      titulo.style.fontWeight = "700";
      titulo.style.color = "#854F0B";
      titulo.style.opacity = "0";

      const subtitulo = document.createElement("div");
      subtitulo.textContent = config.subtitulo;
      subtitulo.style.fontSize = "14px";
      subtitulo.style.fontWeight = "500";
      subtitulo.style.color = "#E8A020";
      subtitulo.style.opacity = "0";

      overlay.appendChild(emoji);
      overlay.appendChild(titulo);
      overlay.appendChild(subtitulo);
      document.body.appendChild(overlay);

      requestAnimationFrame(() => {
        overlay.style.opacity = "1";
        emoji.animate(
          [
            { transform: "scale(0.3)" },
            { transform: "scale(1.4)", offset: 0.6 },
            { transform: "scale(1)" }
          ],
          { duration: 500, easing: "cubic-bezier(0.34, 1.56, 0.64, 1)", fill: "forwards" }
        );

        setTimeout(() => {
          titulo.style.transition = "opacity 300ms ease";
          titulo.style.opacity = "1";
        }, 200);

        setTimeout(() => {
          subtitulo.style.transition = "opacity 300ms ease";
          subtitulo.style.opacity = "1";
        }, 350);
      });

      setTimeout(() => {
        overlay.style.transition = "opacity 800ms ease";
        overlay.style.opacity = "0";
      }, 2200);

      setTimeout(() => {
        overlay.remove();
      }, 3000);

      const iconesParticula = ["🔥", "🔶", "✨"];
      for (let i = 0; i < 12; i += 1) {
        const p = document.createElement("div");
        p.textContent = iconesParticula[Math.floor(Math.random() * iconesParticula.length)];
        p.style.position = "fixed";
        p.style.pointerEvents = "none";
        p.style.zIndex = "9998";
        p.style.left = (40 + Math.random() * 20) + "%";
        p.style.top = (40 + Math.random() * 20) + "%";
        p.style.fontSize = (16 + Math.random() * 16) + "px";
        p.style.opacity = "1";
        document.body.appendChild(p);

        const tx = -120 + Math.random() * 240;
        const ty = -200 + Math.random() * 220;
        const rot = -30 + Math.random() * 60;
        const dur = 1200 + Math.random() * 800;

        p.animate(
          [
            { transform: "translate(0, 0) rotate(0deg)", opacity: 1 },
            { transform: "translate(" + tx + "px, " + ty + "px) rotate(" + rot + "deg)", opacity: 0 }
          ],
          { duration: dur, easing: "ease-out", fill: "forwards" }
        );

        setTimeout(() => {
          p.remove();
        }, 3000);
      }
    }

        <ul class="howto-response-list">

    function transicaoParaResultados() {
      el.gameShell.classList.add("fade-out");
      window.setTimeout(() => {
        renderResumoFinal();
        el.gameShell.classList.remove("fade-out");
      }, 300);
    }

    function renderOpcoes(carta) {
      el.options.innerHTML = "";

      const opcoes = embaralhar(carta.opcoes);
      opcoes.forEach((opcao) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-btn";
        btn.textContent = opcao.texto;
        btn.addEventListener("click", () => selecionarOpcao(carta, opcao, btn));
        el.options.appendChild(btn);
      });
    }

    function aplicarPontuacao(carta, pontos) {
      carta.indicadores.forEach((indicador) => {
        if (Object.prototype.hasOwnProperty.call(state.pontuacoes, indicador)) {
          state.pontuacoes[indicador] += pontos;
        }
      });
    }

    function selecionarOpcao(carta, opcaoEscolhida, botaoEscolhido) {
      if (state.respondeu) {
        return;
      }

      state.respondeu = true;
      aplicarPontuacao(carta, opcaoEscolhida.pontos);

      let mostrarComboInterrupcao = false;

      if (opcaoEscolhida.tipo === "adaptativo") {
        comboAtual += 1;
        if (comboAtual > comboMaximo) {
          comboMaximo = comboAtual;
        }
        if (comboAtual === 3 || comboAtual === 5 || comboAtual === 7) {
          dispararAnimacaoCombo(comboAtual);
        }
      } else if (opcaoEscolhida.tipo === "parcial") {
        if (comboAtual < 3) {
          comboAtual = 0;
        }
      } else {
        if (comboAtual >= 3 && comboInterrompidoJaExibiu === false) {
          mostrarComboInterrupcao = true;
          comboInterrompidoJaExibiu = true;
        }
        comboAtual = 0;
      }

      const style = RESPONSE_STYLE[opcaoEscolhida.tipo];
      botaoEscolhido.style.background = style.bg;
      botaoEscolhido.style.borderColor = style.border;
      botaoEscolhido.style.color = style.text;

      const botoes = el.options.querySelectorAll(".option-btn");
      botoes.forEach((btn) => {
        if (btn !== botaoEscolhido) {
          btn.classList.add("is-dimmed");
        }
      });

      el.microfeedback.style.background = style.bg;
      el.microfeedback.style.borderLeftColor = style.border;
      el.microfeedback.style.color = style.text;

      el.feedbackBadge.style.background = "transparent";
      el.feedbackBadge.style.color = style.text;
      if (opcaoEscolhida.tipo === "adaptativo") {
        el.feedbackTypeLabel.textContent = "✓ Resposta adaptativa (+2)";
      } else if (opcaoEscolhida.tipo === "parcial") {
        el.feedbackTypeLabel.textContent = "~ Resposta parcialmente desadaptativa (+1)";
      } else {
        el.feedbackTypeLabel.textContent = "✕ Resposta desadaptativa (0)";
      }
      el.feedbackText.textContent = opcaoEscolhida.feedback;
      el.microfeedback.classList.add("show");

      if (mostrarComboInterrupcao) {
        exibirComboInterrompido();
      } else if (comboAtual >= 3) {
        exibirComboSequencia(comboAtual);
      } else {
        limparComboVisual();
      }

      window.setTimeout(() => {
        el.nextBtn.classList.add("show");
      }, 400);
    }

    function renderResumoFinal() {
      const resultado = calcularResultados();
      const classificacaoGeral = classificarGeral(resultado.media);

      el.card.hidden = true;
      el.options.hidden = true;
      el.nextBtn.classList.remove("show");
      el.summary.hidden = false;
      el.gameHeader.hidden = true;
      el.indicatorGrid.hidden = true;

      el.progressText.textContent = "CARTA 12 DE 12";
      renderIndicadores([]);

      el.journeyText.textContent = textoSaudacao(classificacaoGeral);
      if (comboMaximo >= 3) {
        el.comboSummaryText.hidden = false;
        el.comboSummaryText.textContent = "🔥 Sua maior sequência foi de " + comboMaximo + " escolhas saudáveis seguidas.";
      } else {
        el.comboSummaryText.hidden = true;
        el.comboSummaryText.textContent = "";
      }

      el.panoramaList.innerHTML = "";
      const fillsParaAnimar = [];
      RESULT_ORDER.forEach((indicador) => {
        const percentual = resultado.percentuais[indicador];
        const status = classificarIndicador(percentual);
        const meta = RESULT_META[indicador];

        const row = document.createElement("div");
        row.className = "panorama-row";

        const label = document.createElement("div");
        label.className = "panorama-label";
        label.textContent = meta.emoji + " " + indicador;

        const track = document.createElement("div");
        track.className = "panorama-track";

        const fill = document.createElement("div");
        fill.className = "panorama-fill";
        fill.style.background = meta.color;
        fill.style.width = "0%";
        track.appendChild(fill);

        const statusText = document.createElement("div");
        statusText.className = "panorama-status";
        if (status.texto.includes("Parcialmente desadaptativo")) {
          statusText.innerHTML = status.texto.replace("Parcialmente desadaptativo", "Parcialmente<br>desadaptativo");
        } else {
          statusText.textContent = status.texto;
        }
        statusText.style.color = status.cor === "indicador" ? meta.color : status.cor;

        row.appendChild(label);
        row.appendChild(track);
        row.appendChild(statusText);
        el.panoramaList.appendChild(row);

        fillsParaAnimar.push({ fill, percentual });
      });

      const desc = [...RESULT_ORDER].sort((a, b) => resultado.percentuais[b] - resultado.percentuais[a]);
      const asc = [...RESULT_ORDER].sort((a, b) => resultado.percentuais[a] - resultado.percentuais[b]);

      let forte = desc[0];
      let desenvolver = asc[0];

      if (forte === desenvolver) {
        forte = desc.find((indicador) => indicador !== desenvolver) || desc[0];
        desenvolver = asc.find((indicador) => indicador !== forte) || asc[0];
      }

      el.strongIndicatorName.textContent = RESULT_META[forte].emoji + " " + forte;
      el.strongIndicatorText.textContent = RESULT_META[forte].forte;
      el.weakIndicatorName.textContent = RESULT_META[desenvolver].emoji + " " + desenvolver;
      el.weakIndicatorText.textContent = RESULT_META[desenvolver].desenvolver;

      const menorDois = [];
      asc.forEach((indicador) => {
        if (menorDois.length < 2 && !menorDois.includes(indicador)) {
          menorDois.push(indicador);
        }
      });

      el.reflectionList.innerHTML = "";
      menorDois.forEach((indicador) => {
        const item = document.createElement("div");
        item.className = "reflection-item";

        const dot = document.createElement("span");
        dot.className = "reflection-dot";
        dot.setAttribute("aria-hidden", "true");

        const text = document.createElement("span");
        text.className = "reflection-text";
        text.textContent = RESULT_META[indicador].dica;

        item.appendChild(dot);
        item.appendChild(text);
        el.reflectionList.appendChild(item);
      });

      const itemAjuda = document.createElement("div");
      itemAjuda.className = "reflection-item";
      const dotAjuda = document.createElement("span");
      dotAjuda.className = "reflection-dot";
      dotAjuda.setAttribute("aria-hidden", "true");
      const textAjuda = document.createElement("span");
      textAjuda.className = "reflection-text";
      textAjuda.textContent = "Pedir ajuda é um ato de coragem. Se precisar, procure um psicólogo. A psicoterapia é um caminho valioso de autocuidado.";
      itemAjuda.appendChild(dotAjuda);
      itemAjuda.appendChild(textAjuda);
      el.reflectionList.appendChild(itemAjuda);

      el.summary.classList.remove("show");
      void el.summary.offsetWidth;
      window.setTimeout(() => {
        el.summary.classList.add("show");
      }, 10);

      window.setTimeout(() => {
        fillsParaAnimar.forEach(({ fill, percentual }) => {
          fill.style.width = percentual + "%";
        });
      }, 400);
    }

    function reiniciarJogo() {
      state.indiceAtual = 0;
      state.respondeu = false;
      state.mostrandoCartaComoJogar = true;
      state.pontuacoes = {
        "Pensamento": 0,
        "Emoção": 0,
        "Comportamento": 0,
        "Saúde física": 0
      };
      comboAtual = 0;
      comboMaximo = 0;
      comboInterrompidoJaExibiu = false;
      if (!el.summary.hidden) {
        el.summary.classList.remove("show");
        el.gameShell.classList.add("fade-out");
        window.setTimeout(() => {
          el.summary.hidden = true;
          renderCartaComoJogar();
          window.requestAnimationFrame(() => {
            el.gameShell.classList.remove("fade-out");
          });
        }, 300);
      } else {
        renderCartaComoJogar();
      }
    }

    el.startBtn.addEventListener("click", () => {
      mostrarTelaJogo();
      state.mostrandoCartaComoJogar = true;
      window.setTimeout(() => {
        renderCartaComoJogar();
      }, 80);
    });

    el.aboutBtn.addEventListener("click", () => {
      abrirModalSobre();
    });

    el.nextBtn.addEventListener("click", () => {
      if (state.mostrandoCartaComoJogar) {
        state.mostrandoCartaComoJogar = false;
        state.indiceAtual = 0;
        renderCarta();
        return;
      }

      if (!state.respondeu) {
        return;
      }
      state.indiceAtual += 1;
      renderCarta();
    });

    el.closeBtn.addEventListener("click", () => {
      el.gameScreen.classList.add("is-hidden");
      el.startScreen.classList.remove("is-hidden");
    });

    el.restartBtn.addEventListener("click", reiniciarJogo);
  </script>
</body>
</html>
